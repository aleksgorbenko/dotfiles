"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$character"""

right_format = """
$kubernetes\
$jobs\
$cmd_duration\
$time"""

# LEFT PROMPT MODULES

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "#3A85AB"
use_os_path_sep = true
# everything before the repo
truncate_to_repo = true
# number of characters to display of truncated directory names
fish_style_pwd_dir_length = 2
truncation_length = 0
truncation_symbol = "…/"
read_only_style = "bold red"
format = "[$path]($style)[$read_only]($read_only_style)"
repo_root_style = "bold #4EACF8"
before_repo_root_style = "#3A85AB"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "#80D440"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold #4EACF8"
format = "[$all_status$ahead_behind]($style) "
ahead = "[⇡${count}](#FF8C00)"
behind = "[⇣${count}](#FF8C00)"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "[?${count}](#4EACF8)"
modified = "[!${count}](#80D440)"
staged = "[+${count}](#FFD700)"

# RIGHT PROMPT MODULES

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '

[jobs]
symbol = "✦ "
style = "bold yellow"
format = '[$symbol$number]($style) '

[cmd_duration]
min_time = 1000
style = "yellow"
format = '[$duration]($style) '

[time]
disabled = false
time_format = "%R"
style = "dimmed"
format = '[$time]($style)'
